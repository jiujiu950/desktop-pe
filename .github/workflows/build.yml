name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "桌面宠物" --add-data "character_rgba.png;." --clean desktop_pet.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-exe
          path: dist/桌面宠物.exe
